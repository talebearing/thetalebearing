<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Keuangan - Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }</style>
</head>
<body>
    <nav class="no-print"><div class="brand">Thetalebearing</div><div class="nav-actions"><button onclick="openProfile()" class="profile-btn">👤 <span id="display-user"></span></button><button onclick="logout()" class="btn-danger" style="padding:6px 12px; font-size:11px;">Logout</button></div></nav>

    <div class="container no-print">
        <div class="admin-tabs">
            <button onclick="window.location.href='admin.html'">📊 Dashboard</button>
            <button onclick="window.location.href='admin-project.html'">📁 Project & Booking</button>
            <button onclick="window.location.href='admin-schedule.html'" class="admin-only">⏰ Jadwal & Kuota</button>
            <button onclick="window.location.href='admin-finance.html'" class="active admin-only">💰 Keuangan</button>
            <button onclick="window.location.href='admin-package.html'" class="admin-only">📦 Paket Layanan</button>
            <button onclick="window.location.href='admin-settings.html'" class="admin-only">⚙️ Pengaturan</button>
        </div>

        <div class="grid-3" style="margin-bottom: 25px;">
            <div class="stat-box" style="border-left-color: var(--primary);"><div style="font-size:11px; color:var(--text-muted); font-weight:700;">TOTAL OMZET KESELURUHAN</div><div id="fin-omzet" style="font-size:24px; font-weight:800; color:var(--primary);">IDR 0</div></div>
            <div class="stat-box" style="border-left-color: var(--success);"><div style="font-size:11px; color:var(--text-muted); font-weight:700;">UANG DITERIMA (LUNAS/DP)</div><div id="fin-masuk" style="font-size:24px; font-weight:800; color:var(--success);">IDR 0</div></div>
            <div class="stat-box" style="border-left-color: var(--danger);"><div style="font-size:11px; color:var(--text-muted); font-weight:700;">SISA PIUTANG (BELUM LUNAS)</div><div id="fin-piutang" style="font-size:24px; font-weight:800; color:var(--danger);">IDR 0</div></div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
            <h2 style="margin:0; font-size: 1.6rem;">Rincian Transaksi Client</h2>
            <div style="display: flex; gap: 10px; align-items: center;"><input type="month" id="filter-month" onchange="renderFinance()" style="padding: 8px;"><button onclick="document.getElementById('filter-month').value=''; renderFinance();" class="btn-sec">Reset</button></div>
        </div>

        <div class="table-wrapper"><table><thead><tr><th>Client & Tanggal</th><th>Tagihan (IDR)</th><th>Dibayar (IDR)</th><th>Sisa (IDR)</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="finance-table"></tbody></table></div>
    </div>
    
    <div id="finance-modal" class="modal-overlay hidden no-print"><div class="modal-content"><h2 style="margin-top:0;">Update Pembayaran</h2><input type="hidden" id="f-edit-index"><div class="form-group"><label>Nama Client</label><input type="text" id="f-name" disabled></div><div class="form-group currency-input"><label>Total Tagihan (IDR)</label><input type="text" id="f-total" oninput="maskRupiah(this)"></div><div class="form-group currency-input"><label>Sudah Dibayar (IDR)</label><input type="text" id="f-paid" oninput="maskRupiah(this)"></div><button onclick="saveFinanceData()" class="btn-primary" style="width:100%; margin-top:20px;">Simpan</button><button onclick="closeModal('finance-modal')" class="btn-sec" style="width:100%; margin-top:10px;">Batal</button></div></div>
    <div id="profile-modal" class="modal-overlay hidden"><div class="modal-content" style="max-width: 400px; text-align: center;"><div style="font-size: 50px; margin-bottom: 10px;">👤</div><h2 id="prof-name" style="margin:0;">Name</h2><p id="prof-role" style="color:var(--primary); font-weight:700; font-size:12px; text-transform:uppercase; margin:5px 0 20px 0;">Role</p><button onclick="closeModal('profile-modal')" class="btn-sec" style="width:100%; margin-top:20px;">Tutup</button></div></div>
    <div id="invoice-print-area" class="hidden"></div>
    <footer class="no-print" style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 12px; margin-top: auto;"><b>Thetalebearing Studio Management System</b> &copy; 2026</footer>

<script src="database.js"></script>
<script>
    const session = getSession(); if(!session || !['admin', 'superadmin'].includes(session.role)) window.location.href = 'index.html';
    document.getElementById('display-user').innerText = session.name; document.getElementById('prof-name').innerText = session.name; document.getElementById('prof-role').innerText = session.role;

    let clients = getClients();

    function renderFinance() {
        const filterVal = document.getElementById('filter-month').value;
        let filteredClients = filterVal ? clients.filter(c => c.date && c.date.startsWith(filterVal)) : clients;
        let tOmzet = 0; let tMasuk = 0; let tPiutang = 0;
        filteredClients.forEach(c => { const t = c.financeTotal||0; const p = c.financePaid||0; const d = t-p>0?t-p:0; tOmzet+=t; tMasuk+=p; tPiutang+=d; });
        document.getElementById('fin-omzet').innerText = formatRupiah(tOmzet); document.getElementById('fin-masuk').innerText = formatRupiah(tMasuk); document.getElementById('fin-piutang').innerText = formatRupiah(tPiutang);

        const tbody = document.getElementById('finance-table');
        if(filteredClients.length === 0) return tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 30px;">Tidak ada data keuangan.</td></tr>`;

        tbody.innerHTML = filteredClients.map((c) => {
            const originalIndex = clients.findIndex(orig => orig.user === c.user);
            const t = c.financeTotal||0; const p = c.financePaid||0; const d = t-p>0?t-p:0;
            let badge = `<span style="background:#FEE2E2; color:#DC2626; padding:4px 8px; font-weight:700; font-size:10px; border-radius:4px;">BELUM BAYAR</span>`;
            if (p >= t && t > 0) badge = `<span style="background:#D1FAE5; color:#065F46; padding:4px 8px; font-weight:700; font-size:10px; border-radius:4px;">LUNAS</span>`;
            else if (p > 0 && p < t) badge = `<span style="background:#FEF3C7; color:#B45309; padding:4px 8px; font-weight:700; font-size:10px; border-radius:4px;">DP</span>`;
            return `<tr><td><strong>${c.name}</strong><br><span style="font-size:11px;">Tgl: ${c.date||'-'}</span></td><td>${formatRupiah(t)}</td><td style="color:var(--success); font-weight:bold;">${formatRupiah(p)}</td><td style="color:var(--danger); font-weight:bold;">${formatRupiah(d)}</td><td>${badge}</td><td><div style="display:flex; gap:5px; flex-wrap:wrap;">${p < t ? `<button onclick="setLunas(${originalIndex})" class="btn-success">Set Lunas</button>` : ''}<button onclick="openFinanceModal(${originalIndex})" class="btn-sec">Update</button><button onclick="printInvoice(${originalIndex})" class="btn-primary">Cetak PDF</button><button onclick="copyInvoiceWA(${originalIndex})" class="btn-wa">Kuitansi WA</button></div></td></tr>`;
        }).join('');
    }

    function setLunas(idx) { if(confirm("Tandai project ini lunas?")) { clients[idx].financePaid = clients[idx].financeTotal; saveClients(clients); renderFinance(); } }
    function openFinanceModal(idx) { document.getElementById('finance-modal').classList.remove('hidden'); document.getElementById('f-edit-index').value = idx; document.getElementById('f-name').value = clients[idx].name; let ft = document.getElementById('f-total'); ft.value = clients[idx].financeTotal||""; maskRupiah(ft); let fp = document.getElementById('f-paid'); fp.value = clients[idx].financePaid||""; maskRupiah(fp); }
    function saveFinanceData() { const i = parseInt(document.getElementById('f-edit-index').value); clients[i].financeTotal = unmask(document.getElementById('f-total').value); clients[i].financePaid = unmask(document.getElementById('f-paid').value); saveClients(clients); renderFinance(); closeModal('finance-modal'); }

    function copyInvoiceWA(idx) { const c = clients[idx]; const t = c.financeTotal||0; const p = c.financePaid||0; const d = t-p>0?t-p:0; const bank = getSettings().bankAccount || "Belum diatur admin"; let status = d === 0 ? "LUNAS ✅" : "BELUM LUNAS ⏳"; let text = `🧾 *INVOICE THETALEBEARING*\n\nHalo Kak *${c.name}* ✨\nBerikut rincian tagihan Anda:\n\n🏷️ Paket: ${c.paket} (${c.category})\n📅 Tanggal: ${c.date || '-'}\n\n💰 Total Tagihan: *${formatRupiah(t)}*\n💵 Telah Dibayar: *${formatRupiah(p)}*\n\n📉 *Sisa Tagihan: ${formatRupiah(d)}*\n📌 Status: *${status}*\n\n💳 *Rekening Pembayaran:*\n${bank}\n\n*(Mohon konfirmasi ke nomor ini jika sudah transfer)*\n\nTerima kasih!`; navigator.clipboard.writeText(text); alert("Kuitansi Teks disalin!"); }
    function printInvoice(idx) { const c = clients[idx]; const t = c.financeTotal||0; const p = c.financePaid||0; const d = t-p>0?t-p:0; const bank = (getSettings().bankAccount || "-").replace(/\n/g, '<br>'); document.getElementById('invoice-print-area').innerHTML = `<div style="font-family:sans-serif; color:#111827;"><h1>THETALEBEARING</h1><p>INVOICE KEPADA: <b>${c.name}</b></p><p>Paket: ${c.paket} (${c.date})</p><table style="width:100%; border-collapse:collapse; margin-bottom:20px;"><tr style="background:#f3f4f6"><th style="padding:10px; border:1px solid #ddd; text-align:left;">Deskripsi</th><th style="padding:10px; border:1px solid #ddd; text-align:right;">Jumlah</th></tr><tr><td style="padding:10px; border:1px solid #ddd;">Harga Paket & Addons</td><td style="padding:10px; border:1px solid #ddd; text-align:right;">${formatRupiah(t)}</td></tr><tr><td style="padding:10px; border:1px solid #ddd;">Telah Dibayar</td><td style="padding:10px; border:1px solid #ddd; text-align:right; color:#059669;">- ${formatRupiah(p)}</td></tr><tr style="background:#f9fafb"><td style="padding:10px; border:1px solid #ddd; font-weight:bold;">SISA TAGIHAN</td><td style="padding:10px; border:1px solid #ddd; text-align:right; color:#DC2626; font-weight:bold;">${formatRupiah(d)}</td></tr></table><div style="background:#f9fafb; padding:15px; border:1px dashed #ddd; font-size:12px;"><b>Info Pembayaran:</b><br>${bank}</div></div>`; window.print(); }
    
    function openProfile() { document.getElementById('profile-modal').classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    renderFinance();
</script>
</body></html>
